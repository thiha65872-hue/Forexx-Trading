<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Onchain | Next Gen Trading</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0a101d; 
            color: #ffffff; 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding-bottom: 80px; /* Space for bottom buttons */
        }
        .crypto-card { background: #121926; border-radius: 12px; }
        .text-green { color: #00d395; }
        .text-red { color: #ff4d6d; }
        .nav-pill { background: #1a2333; border-radius: 20px; padding: 6px 16px; font-size: 14px; }
        .nav-pill.active { background: #1e40af; border: 1px solid #3b82f6; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0a101d; padding: 15px; display: flex; gap: 12px; border-top: 1px solid #1e293b; }
        .btn-swap { background: #0082ff; border-radius: 10px; flex: 1; padding: 12px; font-weight: bold; text-align: center; }
        .btn-buy { background: #0082ff; border-radius: 10px; flex: 1; padding: 12px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="flex items-center justify-between p-4 bg-[#0a101d] sticky top-0 z-50">
        <div class="flex items-center space-x-2">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white text-xs">D</div>
            <span class="text-lg font-bold tracking-tight text-white uppercase">DeFi Onchain</span>
        </div>
        <div class="flex items-center space-x-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            <button class="bg-[#1e293b] text-blue-400 px-4 py-1.5 rounded-full text-sm font-semibold">Log In</button>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7" /></svg>
        </div>
    </header>

    <!-- Filter Navigation -->
    <div class="flex space-x-3 overflow-x-auto px-4 py-2 no-scrollbar">
        <div class="nav-pill active">Hot</div>
        <div class="nav-pill">Top</div>
        <div class="nav-pill">New</div>
        <div class="nav-pill">Gainers</div>
        <div class="nav-pill">Losers</div>
    </div>

    <!-- BTC Detail Section -->
    <div class="p-4">
        <div class="flex items-center space-x-3 mb-2">
            <img src="https://cryptologos.cc/logos/bitcoin-btc-logo.png" width="32" alt="BTC">
            <div>
                <div class="font-bold">BTC</div>
                <div class="text-xs text-gray-500">Bitcoin</div>
            </div>
        </div>
        
        <div class="flex justify-between items-end mb-4">
            <h1 class="text-3xl font-bold">$76,308.00</h1>
            <span class="text-red font-semibold">-0.27%</span>
        </div>

        <!-- Real-time Chart Container -->
        <div class="crypto-card p-2 mb-6 h-[350px]">
            <div id="tradingview_widget" class="h-full w-full"></div>
        </div>

        <!-- Token Info Grid -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <div class="text-xs text-gray-500">Market Cap</div>
                <div class="font-semibold">$1.52T <span class="text-red text-[10px]">-0.30%</span></div>
                <span class="bg-yellow-600/20 text-yellow-500 text-[10px] px-1 rounded">No.1</span>
            </div>
            <div>
                <div class="text-xs text-gray-500">All-Time High</div>
                <div class="font-semibold">$126,080.00 <span class="text-red text-[10px]">-39.48%</span></div>
            </div>
            <div>
                <div class="text-xs text-gray-500">All-Time Low</div>
                <div class="font-semibold">$67.81 <span class="text-green text-[10px]">+112434.33%</span></div>
            </div>
            <div>
                <div class="text-xs text-gray-500">24h Volume</div>
                <div class="font-semibold">$43.06B</div>
            </div>
        </div>
    </div>

    <!-- Bottom Action Bar -->
    <div class="bottom-nav">
        <div class="btn-swap">Swap</div>
        <div class="btn-buy">Buy</div>
    </div>

    <!-- TradingView Script -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "H",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_top_toolbar": true,
            "hide_legend": true,
            "save_image": false,
            "container_id": "tradingview_widget"
        });
    </script>
</body>
</html>
