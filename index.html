<!DOCTYPE html>
<html>
<head>
  <title>Binance Clone UI</title>
  <style>
    body {
      margin: 0;
      background: #0b0e11;
      color: white;
      font-family: Arial;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px;
      background: #1e2329;
    }

    .logo {
      color: #f0b90b;
      font-weight: bold;
      font-size: 20px;
    }

    .menu a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      color: #f0b90b;
    }

    .btn {
      background: #f0b90b;
      color: black;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }

    .card {
      background: #1e2329;
      padding: 20px;
      margin: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">BINANCE</div>
  <div class="menu">
    <a href="#">Markets</a>
    <a href="#">Trade</a>
    <a href="#">Wallet</a>
  </div>
</header>

<section class="hero">
  <h1>Buy & Sell Crypto</h1>
  <p>Trade Bitcoin, Ethereum and more</p>
  <button class="btn">Get Started</button>
</section>

<div class="card">
  <h3>BTC/USDT</h3>
  <p>Price: $65,000</p>
</div>

</body>
</html>
