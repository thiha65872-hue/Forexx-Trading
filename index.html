<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoPro | Institutional Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #f0f2f5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .border-panel { border: 1px solid #1e2329; }
        .bg-card { background-color: #12161c; }
        .text-buy { color: #00c087; }
        .text-sell { color: #f84960; }
        .bg-buy { background-color: #00c087; }
        .bg-sell { background-color: #f84960; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2b3139; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- TOP NAVIGATION (MetaMask & Crypto.com Style) -->
    <nav class="h-14 flex items-center justify-between px-4 border-b border-panel bg-card">
        <div class="flex items-center space-x-8">
            <div class="text-xl font-bold text-blue-500 tracking-tighter">CRYPTO<span class="text-white">.COM</span></div>
            <div class="hidden lg:flex space-x-6 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-white">Markets</a>
                <a href="#" class="hover:text-white text-blue-400">Trade</a>
                <a href="#" class="hover:text-white">Derivatives</a>
                <a href="#" class="hover:text-white">NFT</a>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-right hidden sm:block">
                <div class="text-xs text-gray-500">Total Balance</div>
                <div class="text-sm font-bold text-green-400">$42,580.12</div>
            </div>
            <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-md text-sm font-bold transition">
                Connect Wallet
            </button>
        </div>
    </nav>

    <!-- MAIN TERMINAL -->
    <div class="flex-1 grid grid-cols-12 gap-1 p-1 overflow-hidden">
        
        <!-- LEFT: MARKET SELECTION -->
        <aside class="col-span-2 bg-card border-panel rounded-sm flex flex-col">
            <div class="p-3 border-b border-panel font-semibold text-sm">Markets</div>
            <div class="flex-1 overflow-y-auto">
                <div class="p-3 flex justify-between hover:bg-gray-800 cursor-pointer border-l-2 border-blue-500">
                    <span class="text-xs font-bold text-white">BTC/USD</span>
                    <span class="text-xs text-buy">68,432.1</span>
                </div>
                <div class="p-3 flex justify-between hover:bg-gray-800 cursor-pointer">
                    <span class="text-xs font-bold text-white">ETH/USD</span>
                    <span class="text-xs text-buy">3,241.5</span>
                </div>
                <div class="p-3 flex justify-between hover:bg-gray-800 cursor-pointer">
                    <span class="text-xs font-bold text-white">SOL/USD</span>
                    <span class="text-xs text-sell">145.28</span>
                </div>
            </div>
        </aside>

        <!-- CENTER: CHART & ORDER BOOK -->
        <main class="col-span-7 flex flex-col space-y-1">
            <!-- LIVE CHART -->
            <section class="flex-1 bg-card border-panel rounded-sm overflow-hidden">
                <div id="tradingview_chart" class="h-full"></div>
            </section>
            
            <!-- RECENT TRADES / ORDER BOOK -->
            <section class="h-48 bg-card border-panel rounded-sm grid grid-cols-2 text-[10px]">
                <div class="p-2 border-r border-panel">
                    <div class="text-gray-500 mb-2 uppercase">Order Book (Bids)</div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-buy"><span>68,430.5</span><span>0.124</span></div>
                        <div class="flex justify-between text-buy opacity-80"><span>68,428.2</span><span>1.500</span></div>
                        <div class="flex justify-between text-buy opacity-60"><span>68,425.0</span><span>0.892</span></div>
                    </div>
                </div>
                <div class="p-2">
                    <div class="text-gray-500 mb-2 uppercase">Order Book (Asks)</div>
                    <div class="space-y-1">
                        <div class="flex justify-between text-sell"><span>68,435.1</span><span>0.052</span></div>
                        <div class="flex justify-between text-sell opacity-80"><span>68,438.9</span><span>2.110</span></div>
                        <div class="flex justify-between text-sell opacity-60"><span>68,440.0</span><span>0.435</span></div>
                    </div>
                </div>
            </section>
        </main>

        <!-- RIGHT: EXECUTION & WALLET -->
        <aside class="col-span-3 flex flex-col space-y-1">
            <div class="flex-1 bg-card border-panel p-4 rounded-sm">
                <div class="flex space-x-4 border-b border-panel mb-4">
                    <button class="pb-2 border-b-2 border-blue-500 text-sm font-bold">Limit</button>
                    <button class="pb-2 text-sm text-gray-500">Market</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-500">Price</span>
                            <span class="text-gray-400 font-mono">USD</span>
                        </div>
                        <input type="text" class="w-full bg-[#1e2329] border border-transparent focus:border-blue-500 p-2 rounded text-sm outline-none" value="68432.10">
                    </div>
                    <div>
                        <div class="flex justify-between text-xs mb-1">
                            <span class="text-gray-500">Amount</span>
                            <span class="text-gray-400 font-mono">BTC</span>
                        </div>
                        <input type="number" class="w-full bg-[#1e2329] border border-transparent focus:border-blue-500 p-2 rounded text-sm outline-none" placeholder="0.00">
                    </div>
                    
                    <div class="pt-4 space-y-3">
                        <button class="w-full bg-buy hover:opacity-90 text-white py-3 rounded font-bold uppercase text-sm">Buy BTC</button>
                        <button class="w-full bg-sell hover:opacity-90 text-white py-3 rounded font-bold uppercase text-sm">Sell BTC</button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- TRADINGVIEW SCRIPT -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "30",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"
        });
    </script>
</body>
</html>
