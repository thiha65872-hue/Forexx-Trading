<!DOCTYPE index.html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProForex | Future Trading Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: #eaecef; font-family: 'Inter', sans-serif; }
        .glass-panel { background: rgba(30, 32, 38, 0.7); border: 1px solid #2b3139; }
        .trade-button-buy { background-color: #2ebd85; }
        .trade-button-sell { background-color: #f6465d; }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="flex items-center justify-between px-6 py-4 border-b border-gray-800 glass-panel">
        <div class="text-2xl font-bold text-yellow-500">PRO-FOREX</div>
        <div class="hidden md:flex space-x-6 uppercase text-sm font-medium">
            <a href="#" class="hover:text-yellow-500">Market</a>
            <a href="#" class="hover:text-yellow-500">Trade</a>
            <a href="#" class="hover:text-yellow-500">Futures</a>
            <a href="#" class="hover:text-yellow-500">Wallet</a>
        </div>
        <button class="bg-yellow-500 text-black px-4 py-2 rounded font-bold hover:bg-yellow-400">Connect Wallet</button>
    </nav>

    <!-- Main Dashboard Container -->
    <main class="grid grid-cols-12 gap-2 p-2 h-[90vh]">
        
        <!-- Left Sidebar: Market List -->
        <section class="col-span-12 md:col-span-3 glass-panel p-4 rounded-lg overflow-hidden">
            <h3 class="text-gray-400 mb-4 font-semibold">Market Pairs</h3>
            <div class="space-y-4">
                <div class="flex justify-between items-center p-2 hover:bg-gray-800 rounded cursor-pointer">
                    <span>EUR / USD</span> <span class="text-green-500">1.0842 +0.12%</span>
                </div>
                <div class="flex justify-between items-center p-2 hover:bg-gray-800 rounded cursor-pointer">
                    <span>GBP / USD</span> <span class="text-red-500">1.2635 -0.05%</span>
                </div>
                <div class="flex justify-between items-center p-2 hover:bg-gray-800 rounded cursor-pointer">
                    <span>USD / JPY</span> <span class="text-green-500">149.21 +0.45%</span>
                </div>
            </div>
        </section>

        <!-- Center: Trading View Chart -->
        <section class="col-span-12 md:col-span-6 glass-panel rounded-lg relative overflow-hidden">
            <!-- TradingView Widget BEGIN -->
            <div class="tradingview-widget-container" style="height:100%;width:100%">
                <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "FX:EURUSD",
                    "interval": "D",
                    "timezone": "Etc/UTC",
                    "theme": "dark",
                    "style": "1",
                    "locale": "en",
                    "enable_publishing": false,
                    "allow_symbol_change": true,
                    "container_id": "tradingview_chart"
                });
                </script>
            </div>
            <!-- TradingView Widget END -->
        </section>

        <!-- Right: Execution Panel -->
        <section class="col-span-12 md:col-span-3 glass-panel p-6 rounded-lg">
            <div class="flex mb-6 border-b border-gray-700">
                <button class="flex-1 pb-2 border-b-2 border-yellow-500">Spot</button>
                <button class="flex-1 pb-2 text-gray-500">Futures</button>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="text-xs text-gray-400">Price (USD)</label>
                    <input type="text" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1" value="1.0842">
                </div>
                <div>
                    <label class="text-xs text-gray-400">Amount</label>
                    <input type="number" class="w-full bg-gray-800 border border-gray-700 p-2 rounded mt-1" placeholder="0.00">
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button class="trade-button-buy py-3 rounded font-bold text-white uppercase">Buy / Long</button>
                    <button class="trade-button-sell py-3 rounded font-bold text-white uppercase">Sell / Short</button>
                </div>
            </div>
        </section>

    </main>

</body>
</html>
